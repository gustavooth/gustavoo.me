server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compressão para os arquivos de texto
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        image/svg+xml
        application/manifest+json;

    # Mapa de MIME padrão do nginx + tipos modernos usados no projeto.
    # IMPORTANTE: incluir mime.types antes, senão html/js/css perdem o tipo
    # correto e são servidos como application/octet-stream.
    include /etc/nginx/mime.types;
    types {
        image/avif                 avif;
        image/webp                 webp;
        video/webm                 webm;
        application/manifest+json  webmanifest;
    }

    # Assets com hash no nome (gerados pelo Vite) podem ser cacheados "para sempre"
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Mídia e ícones servidos da raiz: cache moderado
    location ~* \.(?:mp4|webm|avif|webp|jpg|jpeg|png|svg|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # robots.txt, sitemap.xml, llms.txt, manifest: sempre frescos
    location ~* \.(?:txt|xml|webmanifest)$ {
        expires 1h;
        try_files $uri =404;
    }

    # SPA: qualquer rota desconhecida cai no index.html (sem cache do HTML)
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }
}
